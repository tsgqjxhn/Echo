  <body>
    <div id="root"></div>

    <script>
      window.__echoPhaserHost = window.createEchoPhaserHost({
        title: '幸存者防线',
        width: 1200,
        height: 700,
        backgroundColor: '#050606',
        legacyRootId: 'root'
      });
    </script>

    <div id="echo-portrait-tip" aria-live="polite">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <path d="M12 18h.01"/>
      </svg>
      <span>请旋转设备至横屏<br>以获得最佳游戏体验</span>
    </div>

    <button id="echo-game-back-btn" type="button" aria-label="返回">←</button>

    <script>
      (function () {
        'use strict';

        var root = document.getElementById('root');
        var deployCollapsed = false;
        var deployToggle = document.createElement('button');
        deployToggle.id = 'echo-deploy-toggle';
        deployToggle.type = 'button';
        deployToggle.setAttribute('aria-controls', 'survivor-deploy-panel');
        document.body.appendChild(deployToggle);

        function getDeployPanel() {
          return document.querySelector('[code-path="src/pages/GamePage.tsx:423:15"]');
        }

        function updateDeployToggle() {
          var panel = getDeployPanel();
          var visible = !!panel;
          document.body.classList.toggle('survivor-deploy-collapsed', deployCollapsed);
          deployToggle.style.display = visible ? 'flex' : 'none';
          deployToggle.textContent = deployCollapsed ? '部署' : '›';
          deployToggle.setAttribute('aria-expanded', deployCollapsed ? 'false' : 'true');
          deployToggle.setAttribute('aria-label', deployCollapsed ? '展开部队部署栏' : '收起部队部署栏');
          if (panel) panel.id = 'survivor-deploy-panel';
        }

        deployToggle.addEventListener('click', function () {
          deployCollapsed = !deployCollapsed;
          updateDeployToggle();
        });

        function requestLandscapeMode() {
          try {
            var doc = document.documentElement;
            if (!document.fullscreenElement && doc.requestFullscreen) {
              doc.requestFullscreen().catch(function () {});
            }
          } catch (_) {}

          try {
            var orientation = screen && screen.orientation;
            if (orientation && orientation.lock) {
              orientation.lock('landscape').catch(function () {});
            }
          } catch (_) {}
        }

        var backBtn = document.getElementById('echo-game-back-btn');
        if (backBtn) {
          backBtn.addEventListener('click', function () {
            try {
              window.parent.postMessage({ type: 'game-back' }, '*');
            } catch (_) {}
          });
        }

        var lastTouchAt = 0;
        document.addEventListener('touchend', function (event) {
          var target = event.target;
          var button = target && target.closest && target.closest('button');
          if (!button || button.disabled) return;

          var now = Date.now();
          if (now - lastTouchAt < 280) return;
          lastTouchAt = now;

          event.preventDefault();
          event.stopPropagation();
          setTimeout(function () {
            button.click();
          }, 0);
        }, { passive: false, capture: true });

        // Echo Game Settings Bridge
        window.__survivorSoundEnabled = true;
        window.__survivorBgmEnabled = true;

        window.addEventListener('message', function (event) {
          var data = event.data;
          if (!data) return;

          if (data.type === 'game-settings-changed') {
            var p = data.payload || {};
            if (typeof p.globalSoundEnabled === 'boolean') window.__survivorSoundEnabled = p.globalSoundEnabled;
            if (typeof p.globalBgmEnabled === 'boolean') window.__survivorBgmEnabled = p.globalBgmEnabled;
            document.querySelectorAll('audio').forEach(function(a) {
              if (!window.__survivorBgmEnabled && !a.paused) a.pause();
            });
            return;
          }
          if (data.type === 'game-export-request') {
            var saveData = null;
            try {
              var keys = [];
              for (var i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i));
              var obj = {};
              keys.forEach(function(k) { try { obj[k] = localStorage.getItem(k); } catch(e) {} });
              saveData = JSON.stringify(obj);
            } catch (_) {}
            if (window.parent !== window) {
              window.parent.postMessage({ type: 'game-export-data', requestId: data.requestId, data: { saveData: saveData } }, '*');
            }
            return;
          }
          if (data.type === 'game-import-request') {
            var success = false;
            try {
              if (data.saveData) {
                var parsed = JSON.parse(data.saveData);
                Object.keys(parsed).forEach(function(k) { localStorage.setItem(k, parsed[k]); });
                success = true;
                setTimeout(function() { location.reload(); }, 100);
              }
            } catch (_) {}
            if (window.parent !== window) {
              window.parent.postMessage({ type: 'game-import-result', requestId: data.requestId, success: success }, '*');
            }
            return;
          }

          if (!data || data.source !== 'survivor-defense-host' || data.type !== 'save-now') return;
          try {
            window.parent.postMessage({
              source: 'survivor-defense-game',
              type: 'save-complete',
              requestId: data.requestId,
              ok: true
            }, '*');
          } catch (_) {}
        });

        (function audioMutePatch() {
          var origPlay = HTMLAudioElement.prototype.play;
          HTMLAudioElement.prototype.play = function() {
            if (window.__survivorSoundEnabled === false || window.__survivorBgmEnabled === false) {
              return Promise.resolve();
            }
            return origPlay.apply(this, arguments);
          };
        })();

        /* ===== 防止结束菜单重复弹出（防御层） ===== */
        /* 根因已在 index-CMpIraSm.js 中修复：
           loop() 方法中 onStateChange 现在在游戏结束后只调用一次
           （通过 _endNotified 标志）。以下代码作为 DOM 层防御，
           处理任何极端情况下的重复节点。 */
        var _menuOverlayPaths = {
          gameOver: 'src/pages/GamePage.tsx:570:15',
          levelComplete: 'src/pages/GamePage.tsx:602:15'
        };

        function cleanDuplicateOverlays() {
          var keys = Object.keys(_menuOverlayPaths);
          for (var k = 0; k < keys.length; k++) {
            var path = _menuOverlayPaths[keys[k]];
            var overlays = root.querySelectorAll('[code-path="' + path + '"]');
            if (overlays.length > 1) {
              for (var j = 0; j < overlays.length - 1; j++) {
                overlays[j].parentNode.removeChild(overlays[j]);
              }
            }
          }
        }

        var patchScheduled = false;
        function patchCanvasTouch() {
          patchScheduled = false;
          if (!root) return;
          var canvases = root.querySelectorAll('canvas');
          for (var i = 0; i < canvases.length; i++) {
            canvases[i].style.touchAction = 'none';
          }
          updateDeployToggle();
          cleanDuplicateOverlays();
        }

        function schedulePatch() {
          if (patchScheduled) return;
          patchScheduled = true;
          requestAnimationFrame(patchCanvasTouch);
        }

        setTimeout(schedulePatch, 200);
        setTimeout(schedulePatch, 800);
        setTimeout(requestLandscapeMode, 300);
        document.addEventListener('pointerdown', requestLandscapeMode, { once: true, capture: true });
        window.addEventListener('resize', schedulePatch);

        if (root && typeof MutationObserver !== 'undefined') {
          var observer = new MutationObserver(function () {
            cleanDuplicateOverlays();
            schedulePatch();
          });
          observer.observe(root, { childList: true, subtree: true });
        }
      })();
    </script>
