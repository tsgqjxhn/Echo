<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>问道长生</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="game-container"></div>
  <div id="echo-portrait-tip" aria-live="polite">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
      <path d="M12 18h.01"/>
    </svg>
    <span>请旋转设备至横屏<br>以获得最佳游戏体验</span>
  </div>
  <script>
    (function () {
      function requestLandscapeMode() {
        try {
          var doc = document.documentElement;
          if (!document.fullscreenElement && doc.requestFullscreen) {
            doc.requestFullscreen().catch(function () {});
          }
        } catch (_) {}

        try {
          var orientation = screen && screen.orientation;
          if (orientation && orientation.lock) {
            orientation.lock('landscape').catch(function () {});
          }
        } catch (_) {}
      }

      setTimeout(requestLandscapeMode, 300);
      window.addEventListener('load', function () {
        setTimeout(requestLandscapeMode, 300);
      });
      document.addEventListener('pointerdown', requestLandscapeMode, { once: true, capture: true });
    })();
  </script>
  <script src="./phaser360.min.js"></script>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
