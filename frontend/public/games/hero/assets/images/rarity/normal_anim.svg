    <circle r="40" fill="none" stroke="#cfcfcf" stroke-width="1.2" opacity="0.6">
      <animate attributeName="opacity" values="0.35;0.7;0.35" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
