      <animate attributeName="r" values="50;58;52;50" keyTimes="0;0.33;0.66;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="none" stroke="#2196f3" stroke-width="1.4" opacity="0.75">
