<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff8d6" stop-opacity="1"/>
      <stop offset="0.35" stop-color="#ffd54a" stop-opacity="0.85"/>
      <stop offset="0.75" stop-color="#ff8a00" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#5a2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0.6" stop-color="#fff0a8" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#ffd54a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffd54a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(128 128)">
    <circle r="120" fill="url(#halo)">
      <animate attributeName="r" values="40;120;132;124" keyTimes="0;0.4;0.7;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.7;0.8" keyTimes="0;0.4;0.7;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <g>
      <g fill="#ffe07a" opacity="0.95">
        <polygon points="0,-118 4,-40 0,-32 -4,-40"/>
        <polygon points="0,118 4,40 0,32 -4,40"/>
        <polygon points="-118,0 -40,4 -32,0 -40,-4"/>
        <polygon points="118,0 40,4 32,0 40,-4"/>
        <polygon points="83,-83 32,-30 28,-26 30,-32"/>
        <polygon points="-83,83 -32,30 -28,26 -30,32"/>
        <polygon points="-83,-83 -32,-30 -28,-26 -30,-32"/>
        <polygon points="83,83 32,30 28,26 30,32"/>
      </g>
      <g fill="#fff5c2" opacity="0.85">
        <polygon points="0,-104 2,-50 -2,-50"/>
        <polygon points="0,104 2,50 -2,50"/>
        <polygon points="-104,0 -50,2 -50,-2"/>
        <polygon points="104,0 50,2 50,-2"/>
      </g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="22" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.85;0.7" keyTimes="0;0.3;0.7;1" dur="1.6s" repeatCount="indefinite"/>
    </g>

    <g>
      <g fill="#fff8d6" opacity="0.7">
        <polygon points="0,-96 3,-46 -3,-46"/>
        <polygon points="0,96 3,46 -3,46"/>
        <polygon points="-96,0 -46,3 -46,-3"/>
        <polygon points="96,0 46,3 46,-3"/>
        <polygon points="68,-68 28,-28 24,-24"/>
        <polygon points="-68,68 -28,28 -24,24"/>
        <polygon points="-68,-68 -28,-28 -24,-24"/>
        <polygon points="68,68 28,28 24,24"/>
      </g>
      <animateTransform attributeName="transform" type="rotate" from="22" to="-12" dur="1.6s" repeatCount="indefinite"/>
    </g>

    <circle r="60" fill="url(#core)">
      <animate attributeName="r" values="10;72;90;70;78" keyTimes="0;0.2;0.5;0.8;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.95;1;0.85" keyTimes="0;0.2;0.5;0.8;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <circle r="20" fill="none" stroke="#fff7c2" stroke-width="2" opacity="0.85">
      <animate attributeName="r" values="4;48;88;120" keyTimes="0;0.33;0.66;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.5;0" keyTimes="0;0.33;0.66;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="3;2;1.2;0.6" keyTimes="0;0.33;0.66;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <circle r="14" fill="#ffffff" opacity="0.95">
      <animate attributeName="opacity" values="1;0.5;1;0.6;1" keyTimes="0;0.25;0.5;0.75;1" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="14;18;14;20;14" keyTimes="0;0.25;0.5;0.75;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
