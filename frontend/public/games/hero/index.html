<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>勇士 - 王国远征</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="../_shared/phaser-host/phaser-host.css">
  <style>
    /* Prevent pull-to-refresh */
    html, body { overscroll-behavior: none; }
    body { touch-action: manipulation; }
  </style>
  <script>
  (function(){
    window.__heroLoadErrors = [];
    window.__heroScriptsExpected = 9;
    window.__heroScriptsLoaded = 0;
    function showLoadError(msg) {
      var app = document.getElementById('app');
      if (app) {
        app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ff6b6b;font-size:16px;padding:20px;text-align:center;">' + msg + '</div>';
      }
      try {
        window.parent.postMessage({ source: 'hero-game', type: 'init-error', error: msg }, '*');
      } catch(_) {}
    }
    window.__heroOnScriptLoad = function() {
      window.__heroScriptsLoaded++;
    };
    window.__heroOnScriptError = function(e) {
      var src = (e && e.target && e.target.src) || 'unknown';
      window.__heroLoadErrors.push(src);
      showLoadError('加载失败: ' + src.split('/').pop() + '<br>请刷新重试');
    };
    window.__heroCheckInit = function() {
      if (typeof UI === 'undefined' || typeof UI.init !== 'function') {
        showLoadError('游戏脚本未正确加载，请检查网络后刷新重试');
        return false;
      }
      return true;
    };
  })();
  </script>
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ffd740;font-size:18px;">
      Loading...
    </div>
  </div>

  <script src="../_shared/phaser/phaser.min.js"></script>
  <script src="../_shared/phaser-host/phaser-host.js"></script>
  <script>
  window.__echoPhaserHost = window.createEchoPhaserHost({
    title: '勇士',
    width: 480,
    height: 800,
    backgroundColor: '#121826',
    legacyRootId: 'app'
  });
  </script>

  <!-- Scripts in dependency order -->
  <script defer src="js/assets.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script>
  (function(){
    try {
      var raw = localStorage.getItem('echo_game_hero_settings') || localStorage.getItem('xiang_game_settings');
      var s = raw ? JSON.parse(raw) : {};
      var lv = s.difficultyLevel || s.difficulty || 'normal';
      window.__difficultyMonsterMult = lv === 'easy' ? 0.5 : lv === 'hard' ? 2 : 1;
      window.__difficultyRewardMult = lv === 'easy' ? 0.5 : lv === 'hard' ? 2 : 1;
    } catch(e) {
      window.__difficultyMonsterMult = 1;
      window.__difficultyRewardMult = 1;
    }
  })();
  </script>
  <script>
  (function(){
    window.HERO_SETTINGS_KEY = 'echo_game_hero_settings';
    window.loadHeroSettings = function() {
      try { var raw = localStorage.getItem(HERO_SETTINGS_KEY); return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
    };
    window.saveHeroSettings = function(settings) {
      try { localStorage.setItem(HERO_SETTINGS_KEY, JSON.stringify(settings)); } catch(e) {}
    };
  })();
  </script>
  <script defer src="js/audio.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/data.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/state.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/research.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/roguelike.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/city.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/hero.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/shop.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script defer src="js/main.js" onload="__heroOnScriptLoad()" onerror="__heroOnScriptError(event)"></script>
  <script>
    // Initialize Web Audio API on first user interaction
    document.addEventListener('click', function initAudio() {
      if (typeof HeroAudio !== 'undefined') HeroAudio.init();
      document.removeEventListener('click', initAudio);
    }, { once: true });
    document.addEventListener('touchstart', function initAudioTouch() {
      if (typeof HeroAudio !== 'undefined') HeroAudio.init();
      document.removeEventListener('touchstart', initAudioTouch);
    }, { once: true });
  </script>
</body>
</html>
