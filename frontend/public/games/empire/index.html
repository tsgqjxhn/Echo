<script>
// ===== Web Audio Engine =====
const AudioEngine = {
  ctx: null,
  bgmNodes: [],
  isMuted: false,
  bgmEnabled: true,
  sfxEnabled: true,
  currentBgm: null,
  initialized: false,

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch(e) { console.warn('Web Audio not supported'); }
  },
  ensureInit() { if (!this.initialized) this.init(); if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },

  _osc(freq, type, duration, gain, detune) {
    if (!this.ctx || this.isMuted) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, this.ctx.currentTime);
    if (detune) o.detune.setValueAtTime(detune, this.ctx.currentTime);
    g.gain.setValueAtTime(gain || 0.15, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime + duration);
    return o;
  },
  _noise(duration, gain, freq) {
    if (!this.ctx || this.isMuted) return;
    const bufferSize = this.ctx.sampleRate * duration;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const n = this.ctx.createBufferSource(); n.buffer = buffer;
    const g = this.ctx.createGain(), f = this.ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.setValueAtTime(freq || 800, this.ctx.currentTime);
    g.gain.setValueAtTime(gain || 0.1, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    n.connect(f); f.connect(g); g.connect(this.ctx.destination);
    n.start(); n.stop(this.ctx.currentTime + duration);
  },

  playPlant() { if (!this.sfxEnabled) return; this.ensureInit(); this._noise(0.08, 0.12, 200); setTimeout(() => this._osc(1200, 'square', 0.04, 0.06), 40); },
  playHarvest() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(523, 'sine', 0.1, 0.12); setTimeout(() => this._osc(659, 'sine', 0.1, 0.12), 80); setTimeout(() => this._osc(784, 'sine', 0.15, 0.14), 160); this._noise(0.05, 0.05, 1500); },
  playCoin() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(880, 'sine', 0.08, 0.1); setTimeout(() => this._osc(1200, 'sine', 0.12, 0.12), 50); setTimeout(() => this._osc(1600, 'sine', 0.08, 0.08), 120); },
  playUpgrade() { if (!this.sfxEnabled) return; this.ensureInit(); [262, 330, 392, 523].forEach((f, i) => setTimeout(() => this._osc(f, 'triangle', 0.25, 0.1), i * 70)); },
  playClick() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(1000, 'sine', 0.04, 0.06); },
  playNotification() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(600, 'sine', 0.1, 0.08); setTimeout(() => this._osc(800, 'sine', 0.12, 0.1), 80); },
  playDoor() { if (!this.sfxEnabled) return; this.ensureInit(); this._noise(0.08, 0.08, 600); this._osc(300, 'triangle', 0.1, 0.06); },
  playMachine() { if (!this.sfxEnabled) return; this.ensureInit(); this._noise(0.15, 0.04, 400); this._osc(80, 'sawtooth', 0.1, 0.03); },
  playCustomer() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(440, 'sine', 0.08, 0.08); setTimeout(() => this._osc(550, 'sine', 0.1, 0.08), 60); },
  playTruck() { if (!this.sfxEnabled) return; this.ensureInit(); this._noise(0.3, 0.06, 300); this._osc(100, 'sawtooth', 0.2, 0.04); setTimeout(() => this._osc(80, 'sawtooth', 0.2, 0.03), 100); },
  playEventGood() { if (!this.sfxEnabled) return; this.ensureInit(); [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this._osc(f, 'sine', 0.2, 0.1), i * 60)); },
  playEventBad() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(300, 'sawtooth', 0.2, 0.08); setTimeout(() => this._osc(250, 'sawtooth', 0.25, 0.08), 100); },
  playAchievement() { if (!this.sfxEnabled) return; this.ensureInit(); [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => this._osc(f, 'triangle', 0.18, 0.1), i * 80)); },
  playNpcTalk() { if (!this.sfxEnabled) return; this.ensureInit(); this._osc(600, 'sine', 0.05, 0.05); setTimeout(() => this._osc(700, 'sine', 0.05, 0.05), 60); },

  stopBGM() {
    this.bgmNodes.forEach(n => { try { n.stop(); n.disconnect(); } catch(e) {} });
    this.bgmNodes = []; this.currentBgm = null;
  },
  _startChordLoop(chords, tempo, style) {
    if (!this.ctx || this.isMuted || !this.bgmEnabled) return;
    this.stopBGM();
    this.currentBgm = style;
    const beat = 60 / tempo;
    let chordIdx = 0, noteIdx = 0;
    const playNext = () => {
      if (this.currentBgm !== style || this.isMuted || !this.bgmEnabled) return;
      const chord = chords[chordIdx % chords.length];
      const freq = chord[noteIdx % chord.length];
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = style === 'farm' ? 'triangle' : style === 'factory' ? 'sawtooth' : style === 'shop' ? 'sine' : 'triangle';
      o.frequency.setValueAtTime(freq, this.ctx.currentTime);
      g.gain.setValueAtTime(0.04, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + beat * 1.5);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(); o.stop(this.ctx.currentTime + beat * 1.5);
      this.bgmNodes.push(o);
      noteIdx++;
      if (noteIdx >= chord.length) { noteIdx = 0; chordIdx++; }
      setTimeout(playNext, beat * 250);
    };
    playNext();
  },
  startFarmBGM() {
    const chords = [[262,330,392],[294,370,440],[349,440,523],[330,415,494]];
    this._startChordLoop(chords, 100, 'farm');
  },
  startFactoryBGM() {
    const chords = [[110,165,220],[130,196,262],[146,220,294],[123,185,247]];
    this._startChordLoop(chords, 130, 'factory');
  },
  startShopBGM() {
    const chords = [[330,415,494],[294,370,440],[349,440,523],[392,494,587]];
    this._startChordLoop(chords, 90, 'shop');
  },
  startMenuBGM() {
    const chords = [[262,330,392],[294,349,440],[330,415,494],[349,392,523]];
    this._startChordLoop(chords, 80, 'menu');
  },
  playPrestigeBGM() {
    if (!this.ctx || this.isMuted) return; this.ensureInit();
    this.stopBGM();
    [262,330,392,523,659,784,1047].forEach((f,i) => setTimeout(() => this._osc(f,'triangle',0.4,0.08),i*120));
  },
  switchBGM(tab) {
    if (!this.bgmEnabled) return;
    const map = { farm: 'startFarmBGM', factory: 'startFactoryBGM', shop: 'startShopBGM', logistics: 'startShopBGM', upgrades: 'startMenuBGM', buffs: 'startMenuBGM', overview: 'startMenuBGM' };
    const fn = map[tab];
    if (fn && this.currentBgm !== tab) { this[fn](); this.currentBgm = tab; }
  },
};

function randomUnlockedCrop(s) {
  const unlocked = Object.keys(CROP_DATA).filter(k => s.level >= CROP_DATA[k].unlockLevel);
  return unlocked[Math.floor(Math.random() * unlocked.length)] || 'wheat';
}
function randomUnlockedRecipe(s) {
  const unlocked = Object.keys(RECIPE_DATA).filter(k => s.level >= RECIPE_DATA[k].unlockLevel);
  return unlocked[Math.floor(Math.random() * unlocked.length)] || 'flour';
}

function generateQuests(s) {
  if (!s.quests) s.quests = { daily: [], weekly: null, lastDailyReset: 0, lastWeeklyReset: 0 };
  const now = Date.now();
  const dayMs = 86400000, weekMs = 604800000;
  if (now - s.quests.lastDailyReset > dayMs) {
    s.quests.daily = [];
    const templates = QUEST_TEMPLATES.filter(t => t.type === 'daily');
    for (let i = 0; i < 3; i++) {
      const tmpl = templates[Math.floor(Math.random() * templates.length)];
      const q = { ...tmpl, ...tmpl.generate(s), id: 'dq_' + now + '_' + i, completed: false, claimed: false, reward: { gold: 50 + Math.floor(Math.random() * 200), xp: 30 + Math.floor(Math.random() * 100) } };
      if (tmpl.setStart) tmpl.setStart.call(q, s);
      s.quests.daily.push(q);
    }
    s.quests.lastDailyReset = now;
  }
  if (now - s.quests.lastWeeklyReset > weekMs) {
    const wtmpl = QUEST_TEMPLATES.filter(t => t.type === 'weekly');
    const tmpl = wtmpl[Math.floor(Math.random() * wtmpl.length)];
    const q = { ...tmpl, ...tmpl.generate(s), id: 'wq_' + now, completed: false, claimed: false, reward: { gold: 500 + Math.floor(Math.random() * 1000), xp: 300 + Math.floor(Math.random() * 500) } };
    if (tmpl.setStart) tmpl.setStart.call(q, s);
    s.quests.weekly = q;
    s.quests.lastWeeklyReset = now;
  }
}

// Apply difficulty multipliers
(function(){
  const dm = window.__difficultyMonsterMult || 1;
  const dr = window.__difficultyRewardMult || 1;
  for (const k in CROP_DATA) {
    CROP_DATA[k].seedCost = Math.max(1, Math.floor(CROP_DATA[k].seedCost * dm));
    CROP_DATA[k].rawSell = Math.max(1, Math.floor(CROP_DATA[k].rawSell * dr));
  }
  for (const k in RECIPE_DATA) {
    RECIPE_DATA[k].factorySell = Math.max(1, Math.floor(RECIPE_DATA[k].factorySell * dr));
    RECIPE_DATA[k].shopSell = Math.max(1, Math.floor(RECIPE_DATA[k].shopSell * dr));
  }
  for (const k in UPGRADE_DATA) {
    UPGRADE_DATA[k].baseCost = Math.max(1, Math.floor(UPGRADE_DATA[k].baseCost * dm));
  }
  for (const k in BUFF_DATA) {
    BUFF_DATA[k].cost = Math.max(1, Math.floor(BUFF_DATA[k].cost * dm));
  }
})();

function getUpgradeCost(key, lv) {
  const d = UPGRADE_DATA[key];
  return d ? Math.floor(d.baseCost * Math.pow(d.multiplier, lv)) : Infinity;
}

function getGrowthSpeedMultiplier(s) {
  let m = 1;
  m *= (1 - 0.10 * (s.upgrades.irrigation || 0));
  m *= (1 - 0.08 * (s.upgrades.fertilizer || 0));
  m *= (1 - 0.15 * (s.upgrades.tractor || 0));
  m *= (1 - 0.10 * (s.upgrades.greenhouse || 0));
  // Season modifier
  const season = getCurrentSeason(s);
  if (season) m *= SEASONS[season].growthMod;
  // Weather
  if (s.activeWeather) {
    if (s.activeWeather.effect.growthMod) m *= s.activeWeather.effect.growthMod;
    if (s.activeWeather.effect.pestActive && Math.random() < 0.005) {
      const inf = s.farm.plots.find(p => p.crop);
      if (inf) { inf.growthProgress = Math.max(0, inf.growthProgress - 0.1); }
    }
  }
  const b = s.activeBuffs.find(b => b.effect === 'growth_speed');
  if (b) m *= (1 - b.value);
  m *= (1 - 0.05 * s.prestigePoints);
  return Math.max(0.1, m);
}

function getProductionSpeedMultiplier(s) {
  let m = 1;
  m *= (1 - 0.10 * (s.upgrades.speed_boost || 0));
  m *= (1 - 0.15 * (s.upgrades.automation || 0));
  if (s.activeWeather && s.activeWeather.effect.prodMod) m *= 1 / s.activeWeather.effect.prodMod;
  const b = s.activeBuffs.find(b => b.effect === 'production_speed');
  if (b) m *= (1 - b.value);
  m *= (1 - 0.03 * s.prestigePoints);
  return Math.max(0.1, m);
}

function getCustomerRateMultiplier(s) {
  let m = 1;
  m *= (1 + 0.15 * (s.upgrades.advertising || 0));
  m *= (1 + 0.10 * (s.upgrades.decor || 0));
  const b = s.activeBuffs.find(b => b.effect === 'customer_rate');
  if (b) m *= (1 + b.value);
  return m;
}

function getPriceMultiplier(s) {
  let m = 1;
  m *= (1 + 0.05 * (s.upgrades.decor || 0));
  if (s.activeWeather) {
    if (s.activeWeather.effect.priceMod) m *= s.activeWeather.effect.priceMod;
    if (s.activeWeather.effect.harvestMod) m *= s.activeWeather.effect.harvestMod;
  }
  // Season autumn bonus
  const season = getCurrentSeason(s);
  if (season === 'autumn') m *= 1.2;
  const b = s.activeBuffs.find(b => b.effect === 'price_multiplier');
  if (b) m *= (1 + b.value);
  m *= (1 + 0.02 * s.prestigePoints);
  return m;
}

function getCurrentSeason(s) {
  if (!s.seasonStartTime) return 'spring';
  const elapsed = s.gameTime - s.seasonStartTime;
  const idx = (Math.floor(elapsed / SEASON_DURATION) + (s.startSeasonIdx || 0)) % 4;
  return SEASON_ORDER[idx];
}

function getSeasonProgress(s) {
  if (!s.seasonStartTime) return 0;
  const elapsed = s.gameTime - s.seasonStartTime;
  return (elapsed % SEASON_DURATION) / SEASON_DURATION;
}

function getXPProgress(s) {
  const cur = LEVEL_XP[s.level] || LEVEL_XP[LEVEL_XP.length - 1];
  const prev = s.level > 0 ? (LEVEL_XP[s.level - 1] || 0) : 0;
  return (s.xp - prev) / (cur - prev);
}

function addXP(s, a) { s.xp += a; while (s.level < 50 && s.xp >= LEVEL_XP[s.level]) s.level++; }
function addGold(s, a) {
  s.gold += a;
  if (a > 0) { s.totalEarnings += a; s.stats.totalRevenue += a; }
  else s.stats.totalSpent += Math.abs(a);
}
function hasGold(s, a) { return s.gold >= a; }
function getInv(s, item) { return s.inventory[item] || 0; }
function addInv(s, item, a) { if (!s.inventory[item]) s.inventory[item] = 0; s.inventory[item] += a; if (s.inventory[item] <= 0) delete s.inventory[item]; }
function hasInv(s, item, a) { return (s.inventory[item] || 0) >= a; }

function saveGame(s, options) {
  const force = options === true || (options && options.force === true);
  if (!force) return true;
  s.lastSaveTime = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); return true; } catch { return false; }
}
function loadGame() {
  try { const r = localStorage.getItem(SAVE_KEY); return r ? migrateState(JSON.parse(r)) : null; } catch { return null; }
}
function deleteSave() { localStorage.removeItem(SAVE_KEY); }

function ensurePlots(s) {
  while (s.farm.plots.length < s.upgrades.farm_plot)
    s.farm.plots.push({ id: s.farm.plots.length, crop: null, plantedAt: 0, growthProgress: 0 });
}
function ensureMachines(s) {
  while (s.factory.machines.length < s.upgrades.factory_machine)
    s.factory.machines.push({ id: s.factory.machines.length, recipe: null, startTime: 0, progress: 0 });
}
function ensureShelves(s) {
  while (s.shop.shelves.length < s.upgrades.shop_shelf)
    s.shop.shelves.push({ id: s.shop.shelves.length, product: null, quantity: 0, maxQuantity: 10 + (s.upgrades.decor || 0) * 2 });
}
function ensureTrucks(s) {
  while (s.logistics.trucks.length < s.upgrades.truck)
    s.logistics.trucks.push({ id: s.logistics.trucks.length, busy: false, route: null, progress: 0, startTime: 0 });
}

function migrateState(l) {
  const f = createInitialState();
  const r = { ...f, ...l };
  r.farm = { ...f.farm, ...l.farm };
  r.factory = { ...f.factory, ...l.factory };
  r.shop = { ...f.shop, ...l.shop, customers: (l.shop && l.shop.customers) || [] };
  r.logistics = { ...f.logistics, ...l.logistics, autoRoutes: (l.logistics && l.logistics.autoRoutes) || [] };
  r.upgrades = { ...f.upgrades, ...l.upgrades };
  r.stats = { ...f.stats, ...l.stats, seasonStats: (l.stats && l.stats.seasonStats) || {} };
  r.inventory = { ...f.inventory, ...l.inventory };
  r.achievements = l.achievements || {};
  r.quests = l.quests || { daily: [], weekly: null, lastDailyReset: 0, lastWeeklyReset: 0 };
  r.npcProgress = l.npcProgress || {};
  r.settings = l.settings || { bgm: true, sfx: true };
  r.activeWeather = l.activeWeather || null;
  r.seasonStartTime = l.seasonStartTime || 0;
  r.startSeasonIdx = l.startSeasonIdx || 0;
  ensurePlots(r); ensureMachines(r); ensureShelves(r); ensureTrucks(r);
  return r;
}

// ===== systems.js =====
let notifId = 0;

function notify(s, msg, type) {
  s.notifications.push({ id: ++notifId, message: msg, type: type || 'info', time: Date.now() });
  if (s.notifications.length > 12) s.notifications = s.notifications.slice(-12);
}

function calculateOfflineEarnings(s) {
  const offSec = (Date.now() - (s.lastSaveTime || Date.now())) / 1000;
  if (offSec < 60) return { gold: 0, xp: 0, items: {}, duration: 0 };
  const dur = Math.min(offSec, 8 * 3600), decay = 0.7;
  let gold = 0; const items = {};
  for (const p of s.farm.plots) {
    if (!p.crop) continue; const cd = CROP_DATA[p.crop]; if (!cd) continue;
    const h = Math.floor(dur / (cd.growTime * getGrowthSpeedMultiplier(s)));
    if (h > 0) { items[p.crop] = (items[p.crop] || 0) + h; gold += h * cd.rawSell * 0.3 * decay; }
  }
  if (s.factoryUnlocked) {
    for (const m of s.factory.machines) {
      if (!m.recipe) continue; const rd = RECIPE_DATA[m.recipe]; if (!rd) continue;
      let can = Math.floor(dur / (rd.processTime * getProductionSpeedMultiplier(s)));
      for (const [inp, q] of Object.entries(rd.inputs)) can = Math.min(can, Math.floor(((items[inp] || 0) + (getInv(s, inp) || 0)) / q));
      if (can > 0) { items[m.recipe] = (items[m.recipe] || 0) + can; gold += can * rd.factorySell * 0.5 * decay; }
    }
  }
  if (s.shopUnlocked) {
    const pm = getPriceMultiplier(s);
    for (const [p, q] of Object.entries(items)) { const rd = RECIPE_DATA[p]; if (rd) gold += Math.floor(q * 0.6 * decay) * rd.shopSell * pm * 0.4; }
  }
  gold = Math.floor(gold);
  return { gold, xp: Math.floor(gold * 0.5), items, duration: dur };
}

function applyOfflineEarnings(s, e) {
  if (e.gold > 0) addGold(s, e.gold);
  if (e.xp > 0) addXP(s, e.xp);
  for (const [i, q] of Object.entries(e.items)) addInv(s, i, q);
  s.gameTime += e.duration;
}

function canPrestige(s) { return s.totalEarnings >= PRESTIGE_THRESHOLD; }
function calculatePrestigePoints(s) { return s.totalEarnings < PRESTIGE_THRESHOLD ? 0 : Math.max(0, Math.floor(Math.pow(s.totalEarnings / PRESTIGE_THRESHOLD, 0.43) - s.prestigePoints)); }
function getPrestigeMultiplier(s) { return 1 + 0.05 * s.prestigePoints; }

function doPrestige(s) {
  const np = calculatePrestigePoints(s); if (np <= 0) return false;
  const pts = s.prestigePoints + np, cnt = s.prestigeCount + 1;
  Object.assign(s, {
    gold: 500 + cnt * 100, xp: 0, level: 1, totalEarnings: 0,
    prestigePoints: pts, prestigeCount: cnt, gameTime: 0, seasonStartTime: 0, startSeasonIdx: 0,
    factoryUnlocked: false, shopUnlocked: false, logisticsUnlocked: false,
    farm: { plots: Array.from({ length: 3 }, (_, i) => ({ id: i, crop: null, plantedAt: 0, growthProgress: 0 })) },
    factory: { machines: [{ id: 0, recipe: null, startTime: 0, progress: 0 }] },
    shop: { shelves: Array.from({ length: 3 }, (_, i) => ({ id: i, product: null, quantity: 0, maxQuantity: 10 })), customers: [], customerTimer: 0, customerInterval: 5, totalCustomersServed: 0 },
    inventory: {},
    logistics: { trucks: [{ id: 0, busy: false, route: null, progress: 0, startTime: 0 }], routes: [], autoRoutes: [] },
    upgrades: { farm_plot: 3, irrigation: 0, fertilizer: 0, greenhouse: 0, tractor: 0, factory_machine: 1, speed_boost: 0, automation: 0, shop_shelf: 3, advertising: 0, decor: 0, truck: 1, truck_speed: 0 },
    activeBuffs: [], activeWeather: null, notifications: [],
  });
  return { newPoints: np, totalPoints: pts };
}

function activateBuff(s, k) {
  const d = BUFF_DATA[k]; if (!d || s.gold < d.cost) return false;
  addGold(s, -d.cost);
  const ex = s.activeBuffs.find(b => b.key === k);
  if (ex) ex.expiresAt = Date.now() + d.duration * 1000;
  else s.activeBuffs.push({ key: k, name: d.name, icon: d.icon, effect: d.effect, value: d.value, expiresAt: Date.now() + d.duration * 1000 });
  return true;
}

function updateBuffs(s) { const now = Date.now(); s.activeBuffs = s.activeBuffs.filter(b => b.expiresAt > now); }

// ===== Weather System =====
function updateWeather(s, dt) {
  if (s.activeWeather) {
    s.activeWeather.remaining -= dt;
    if (s.activeWeather.remaining <= 0) {
      notify(s, s.activeWeather.name + ' 已结束', 'info');
      s.activeWeather = null;
    }
  } else if (Math.random() < 0.0003 * dt) {
    const evt = WEATHER_EVENTS[Math.floor(Math.random() * WEATHER_EVENTS.length)];
    if (Math.random() < evt.chance) {
      s.activeWeather = { ...evt, remaining: evt.duration };
      notify(s, evt.desc, evt.type === 'good' ? 'success' : 'warning');
      if (evt.type === 'good') AudioEngine.playEventGood(); else AudioEngine.playEventBad();
    }
  }
}

// ===== Achievement System =====
function checkAchievements(s) {
  let newlyUnlocked = [];
  for (const a of ACHIEVEMENT_DATA) {
    if (!s.achievements[a.id] && a.check(s)) {
      s.achievements[a.id] = { unlockedAt: Date.now(), tier: a.tier };
      newlyUnlocked.push(a);
    }
  }
  return newlyUnlocked;
}
function getAchievementTierName(tier) {
  return tier === 'gold' ? '金' : tier === 'silver' ? '银' : '铜';
}

// ===== Quest System =====
function updateQuests(s) {
  generateQuests(s);
  // Check daily quests
  for (const q of s.quests.daily) {
    if (!q.completed && q.check && q.check(s)) {
      q.completed = true;
      notify(s, '任务完成: ' + q.text, 'success');
    }
  }
  // Check weekly quest
  const wq = s.quests.weekly;
  if (wq && !wq.completed && wq.check && wq.check(s)) {
    wq.completed = true;
    notify(s, '周任务完成: ' + wq.text, 'success');
  }
}

function claimQuestReward(s, qid) {
  for (const q of s.quests.daily) {
    if (q.id === qid && q.completed && !q.claimed) {
      q.claimed = true;
      addGold(s, q.reward.gold); addXP(s, q.reward.xp);
      s.stats.questsCompleted = (s.stats.questsCompleted || 0) + 1;
      notify(s, '领取奖励: +' + q.reward.gold + 'G +' + q.reward.xp + 'XP', 'gold');
      AudioEngine.playCoin(); return true;
    }
  }
  const wq = s.quests.weekly;
  if (wq && wq.id === qid && wq.completed && !wq.claimed) {
    wq.claimed = true;
    addGold(s, wq.reward.gold); addXP(s, wq.reward.xp);
    s.stats.questsCompleted = (s.stats.questsCompleted || 0) + 1;
    notify(s, '领取周任务奖励: +' + wq.reward.gold + 'G +' + wq.reward.xp + 'XP', 'gold');
    AudioEngine.playCoin(); return true;
  }
  return false;
}

// ===== NPC System =====
function getNPCDialogue(s, npcId) {
  const dialogs = NPC_DIALOGUES[npcId] || [];
  const prog = s.npcProgress[npcId] || 0;
  if (prog >= dialogs.length) return null;
  return dialogs[prog];
}
function advanceNPC(s, npcId) {
  const dialogs = NPC_DIALOGUES[npcId] || [];
  const prog = s.npcProgress[npcId] || 0;
  if (prog < dialogs.length) {
    const d = dialogs[prog];
    if (d.check && d.check(s)) {
      s.npcProgress[npcId] = prog + 1;
      if (d.reward) { addGold(s, d.reward.gold); addXP(s, d.reward.xp); }
      return d;
    }
  }
  return null;
}
function canShowNPC(s, npcId) {
  const npc = NPC_DATA.find(n => n.id === npcId);
  return npc && npc.unlockCondition(s);
}

// ===== Season display =====
function renderSeasonInfo(s) {
  const season = getCurrentSeason(s);
  const sd = SEASONS[season];
  const progress = getSeasonProgress(s);
  const timeLeft = Math.ceil(SEASON_DURATION * (1 - progress));
  return '<div class="season-display" style="border-color:' + sd.color + '">' +
    '<span class="season-icon">' + sd.icon + '</span>' +
    '<span class="season-name" style="color:' + sd.color + '">' + sd.name + '季</span>' +
    '<span class="season-desc">' + sd.desc + '</span>' +
    '<div class="progress-bar small"><div class="progress-fill" style="width:' + Math.floor(progress * 100) + '%;background:' + sd.color + '"></div></div>' +
    '<span class="season-timer">' + formatTime(timeLeft) + '</span>' +
    '</div>';
}

// ===== farm.js =====
function farmPlantCrop(s, plotId, cropKey) {
  const p = s.farm.plots.find(x => x.id === plotId); if (!p || p.crop) return false;
  const cd = CROP_DATA[cropKey]; if (!cd || s.level < cd.unlockLevel || !hasGold(s, cd.seedCost)) return false;
  // Winter check
  const season = getCurrentSeason(s);
  if (season === 'winter' && (s.upgrades.greenhouse || 0) <= 0) { notify(s, '冬季需要温室才能种植！', 'warning'); return false; }
  addGold(s, -cd.seedCost); p.crop = cropKey; p.plantedAt = s.gameTime; p.growthProgress = 0;
  s.stats.totalPlanted = (s.stats.totalPlanted || 0) + 1;
  AudioEngine.playPlant(); return true;
}
function farmHarvestCrop(s, plotId) {
  const p = s.farm.plots.find(x => x.id === plotId); if (!p || !p.crop || p.growthProgress < 1) return false;
  const cd = CROP_DATA[p.crop];
  let y = 1 + Math.floor(Math.random() * 2);
  // Autumn harvest bonus
  const season = getCurrentSeason(s);
  if (season === 'autumn') y = Math.floor(y * 1.2);
  if (s.activeWeather && s.activeWeather.effect.harvestMod) y = Math.floor(y * s.activeWeather.effect.harvestMod);
  addInv(s, p.crop, y); addXP(s, Math.ceil(cd.rawSell * 0.5));
  s.stats.totalHarvested[p.crop] = (s.stats.totalHarvested[p.crop] || 0) + y;
  if (!s.stats.seasonStats) s.stats.seasonStats = {};
  if (!s.stats.seasonStats[season + 'Harvested']) s.stats.seasonStats[season + 'Harvested'] = 0;
  s.stats.seasonStats[season + 'Harvested']++;
  notify(s, '收获了 ' + y + 'x ' + cd.icon + ' ' + cd.name, 'success');
  AudioEngine.playHarvest();
  p.crop = null; p.plantedAt = 0; p.growthProgress = 0; return true;
}
function farmHarvestAll(s) {
  let c = 0;
  for (const p of s.farm.plots) if (p.crop && p.growthProgress >= 1 && farmHarvestCrop(s, p.id)) c++;
  return c;
}
function sellRawCrop(s, k) {
  const cd = CROP_DATA[k]; if (!cd) return false;
  const q = s.inventory[k] || 0; if (q <= 0) return false;
  const r = q * cd.rawSell; addGold(s, r); addXP(s, Math.ceil(r * 0.2)); s.inventory[k] = 0;
  notify(s, '售出 ' + q + 'x ' + cd.icon + ' ' + cd.name + '，获得 ' + r + 'G', 'gold');
  AudioEngine.playCoin(); return true;
}
function updateFarm(s, dt) {
  const gm = getGrowthSpeedMultiplier(s);
  for (const p of s.farm.plots) { if (!p.crop) continue; const cd = CROP_DATA[p.crop]; if (!cd) continue; p.growthProgress = Math.min(1, p.growthProgress + dt / (cd.growTime * gm)); }
}
function buyFarmPlot(s) {
  const c = getUpgradeCost('farm_plot', s.upgrades.farm_plot); if (!hasGold(s, c)) return false;
  addGold(s, -c); s.upgrades.farm_plot++; ensurePlots(s); notify(s, '购买了新农田地块', 'success');
  AudioEngine.playUpgrade(); return true;
}

function renderFarm(s) {
  const ac = Object.entries(CROP_DATA).filter(([_, d]) => s.level >= d.unlockLevel).map(([k, d]) => ({ key: k, ...d }));
  const gm = getGrowthSpeedMultiplier(s);
  let ph = s.farm.plots.map(p => {
    if (!p.crop) {
      const co = ac.map(c => '<button class="btn-plant" ontouchstart="window.game.plantCrop(' + p.id + ',\'' + c.key + '\')" onclick="window.game.plantCrop(' + p.id + ',\'' + c.key + '\')" ' + (s.gold < c.seedCost ? 'disabled' : '') + ' title="种植 ' + c.name + ' - ' + c.seedCost + 'G"><span class="plant-label">' + c.icon + ' ' + c.name + '</span><span class="cost">' + c.seedCost + 'G</span></button>').join('');
      return '<div class="plot empty"><div class="plot-label">空地 #' + (p.id + 1) + '</div><div class="plant-options">' + co + '</div></div>';
    }
    const cd = CROP_DATA[p.crop], pr = Math.min(1, p.growthProgress), pct = Math.floor(pr * 100);
    const ok = pr >= 1;
    return '<div class="plot growing ' + (ok ? 'ready' : '') + '">' +
      '<div class="plot-crop"><span class="crop-emoji">' + cd.icon + '</span></div>' +
      '<div class="plot-name">' + cd.name + '</div>' +
      '<div class="progress-bar"><div class="progress-fill ' + (ok ? 'complete' : '') + '" style="width:' + pct + '%"></div></div>' +
      '<div class="plot-timer">' + (ok ? '可收获!' : Math.ceil((1 - pr) * cd.growTime * gm) + '秒') + '</div>' +
      (ok ? '<button class="btn-harvest" ontouchstart="window.game.harvestCrop(' + p.id + ')" onclick="window.game.harvestCrop(' + p.id + ')">收获</button>' : '') +
      '</div>';
  }).join('');
  const rc = s.farm.plots.filter(p => p.crop && p.growthProgress >= 1).length;
  const hab = rc > 1 ? '<button class="btn-action" ontouchstart="window.game.harvestAll()" onclick="window.game.harvestAll()">全部收获 (' + rc + ')</button>' : '';
  const pc = getUpgradeCost('farm_plot', s.upgrades.farm_plot);
  const bpb = s.upgrades.farm_plot < 20 ? '<button class="btn-action" ontouchstart="window.game.buyFarmPlot()" onclick="window.game.buyFarmPlot()" ' + (s.gold < pc ? 'disabled' : '') + '>购买农田 (' + pc + 'G)</button>' : '';
  var oneClickHtml = '';
  if (ac.length > 0 && s.farm.plots.some(function(pp) { return !pp.crop; })) {

function factoryStartProduction(s, mid, rk) {
  if (!s.factoryUnlocked) return false;
  const m = s.factory.machines.find(x => x.id === mid); if (!m || m.recipe) return false;
  const rd = RECIPE_DATA[rk]; if (!rd || s.level < rd.unlockLevel) return false;
  for (const [i, q] of Object.entries(rd.inputs)) if (!hasInv(s, i, q)) return false;
  for (const [i, q] of Object.entries(rd.inputs)) addInv(s, i, -q);
  m.recipe = rk; m.startTime = s.gameTime; m.progress = 0;
  AudioEngine.playMachine(); return true;
}
function factoryCollectProduct(s, mid) {
  const m = s.factory.machines.find(x => x.id === mid); if (!m || !m.recipe || m.progress < 1) return false;
  const rd = RECIPE_DATA[m.recipe];
  addInv(s, m.recipe, 1); addXP(s, Math.ceil(rd.factorySell * 0.3));
  s.stats.totalProduced[m.recipe] = (s.stats.totalProduced[m.recipe] || 0) + 1;
  notify(s, '生产了 ' + rd.icon + ' ' + rd.name, 'success');
  AudioEngine.playCoin();
  m.recipe = null; m.startTime = 0; m.progress = 0; return true;
}
function factoryCollectAll(s) {
  let c = 0;
  for (const m of s.factory.machines) if (m.recipe && m.progress >= 1 && factoryCollectProduct(s, m.id)) c++;
  return c;
}
function updateFactory(s, dt) {
  if (!s.factoryUnlocked) return;
  const pm = getProductionSpeedMultiplier(s);
  for (const m of s.factory.machines) { if (!m.recipe) continue; const rd = RECIPE_DATA[m.recipe]; if (!rd) continue; m.progress = Math.min(1, m.progress + dt / (rd.processTime * pm)); }
}
function canCraft(s, rk) {
  const rd = RECIPE_DATA[rk]; if (!rd) return false;
  for (const [i, q] of Object.entries(rd.inputs)) if (!hasInv(s, i, q)) return false;
  return true;
}
function sellFactoryProduct(s, k) {
  const rd = RECIPE_DATA[k]; if (!rd) return false;
  const q = s.inventory[k] || 0; if (q <= 0) return false;
  const r = q * rd.factorySell; addGold(s, r); addXP(s, Math.ceil(r * 0.2)); s.inventory[k] = 0;
  notify(s, '售出 ' + q + 'x ' + rd.icon + ' ' + rd.name + '，获得 ' + r + 'G', 'gold');
  AudioEngine.playCoin(); return true;
}
function buyFactoryMachine(s) {
  const c = getUpgradeCost('factory_machine', s.upgrades.factory_machine); if (!hasGold(s, c)) return false;
  addGold(s, -c); s.upgrades.factory_machine++; ensureMachines(s); notify(s, '购买了新加工机器', 'success');

}

const CUSTOMER_NAMES = ['小明','小红','老王','阿花','大壮','小李','美美','阿强','小芳','建国','丽丽','志明','春花','国庆','小雪','大海'];
const CUSTOMER_ICONS = ['\u{1F468}','\u{1F469}','\u{1F474}','\u{1F475}','\u{1F466}','\u{1F467}','\u{1F9D1}','\u{1F471}','\u{1F472}','\u{1F9D4}','\u{1F473}','\u{1F9D3}'];

function shopStockShelf(s, sid, pk) {
  if (!s.shopUnlocked) return false;
  const sh = s.shop.shelves.find(x => x.id === sid); if (!sh) return false;
  const q = s.inventory[pk] || 0; if (q <= 0) return false;
  const space = sh.maxQuantity - sh.quantity; if (space <= 0) return false;
  const amt = Math.min(q, space); addInv(s, pk, -amt); sh.product = pk; sh.quantity += amt; return true;
}
function autoStockShelves(s) {
  for (const sh of s.shop.shelves) { if (sh.quantity > 0) continue; for (const [k, q] of Object.entries(s.inventory)) { if (q > 0 && RECIPE_DATA[k]) { shopStockShelf(s, sh.id, k); break; } } }
}
function updateShop(s, dt) {
  if (!s.shopUnlocked) return;
  const sh = s.shop, rm = getCustomerRateMultiplier(s), ei = sh.customerInterval / rm;
  sh.customerTimer += dt;
  if (sh.customerTimer >= ei) {
    sh.customerTimer = 0;
    const sp = sh.shelves.filter(x => x.quantity > 0 && x.product).map(x => x.product);
    if (sp.length > 0) {
      sh.customers.push({ id: Date.now() + Math.random(), name: CUSTOMER_NAMES[Math.floor(Math.random() * CUSTOMER_NAMES.length)], icon: CUSTOMER_ICONS[Math.floor(Math.random() * CUSTOMER_ICONS.length)], target: sp[Math.floor(Math.random() * sp.length)], patience: 10 + Math.random() * 20, waitTime: 0, satisfied: false });
      AudioEngine.playDoor();
    }
  }
  const pm = getPriceMultiplier(s), rm2 = [];
  for (let i = 0; i < sh.customers.length; i++) {
    const c = sh.customers[i]; c.waitTime += dt;
    if (c.target) {
      const sl = sh.shelves.find(x => x.product === c.target && x.quantity > 0);
      if (sl) {
        sl.quantity--; const rd = RECIPE_DATA[c.target];
        if (rd) { const rev = Math.floor(rd.shopSell * pm); addGold(s, rev); addXP(s, Math.ceil(rev * 0.1)); s.stats.totalSold[c.target] = (s.stats.totalSold[c.target] || 0) + 1; s.stats.totalRevenue += rev; sh.totalCustomersServed++; notify(s, c.icon + ' ' + c.name + ' 购买了 ' + rd.icon + ' ' + rd.name + ' +' + rev + 'G', 'gold'); AudioEngine.playCoin(); }
        if (sl.quantity <= 0) { sl.product = null; sl.quantity = 0; }
        c.satisfied = true; rm2.push(i);
      } else if (c.waitTime >= c.patience) { notify(s, c.icon + ' ' + c.name + ' 等不及离开了...', 'warning'); rm2.push(i); }
    } else if (c.waitTime >= c.patience) { rm2.push(i); }
  }
  for (let i = rm2.length - 1; i >= 0; i--) sh.customers.splice(rm2[i], 1);
}
function buyShopShelf(s) {
  const c = getUpgradeCost('shop_shelf', s.upgrades.shop_shelf); if (!hasGold(s, c)) return false;
  addGold(s, -c); s.upgrades.shop_shelf++; ensureShelves(s); notify(s, '购买了新货架', 'success');
  AudioEngine.playUpgrade(); return true;
}

function renderShop(s) {
  if (!s.shopUnlocked) return '<div class="module-header shop-scene"><h2>商店</h2><p class="module-desc">零售商品，获取最高利润</p></div><div class="locked-module"><div class="lock-icon">\u{1F512}</div><p>商店尚未建造</p><button class="btn-action btn-large" ontouchstart="window.game.buildShop()" onclick="window.game.buildShop()" ' + (s.gold < BUILD_COSTS.shop ? 'disabled' : '') + '>建造商店 (' + BUILD_COSTS.shop + 'G)</button></div>';

    }

  const ch = sh.customers.length > 0 ? sh.customers.slice(0, 8).map(c => '<div class="customer ' + (c.satisfied ? 'happy' : '') + '"><span class="customer-icon">' + c.icon + '</span><span class="customer-name">' + c.name + '</span>' + (c.target ? '<span class="customer-target">想要 ' + (RECIPE_DATA[c.target] ? RECIPE_DATA[c.target].icon + ' ' + RECIPE_DATA[c.target].name : '商品') + '</span>' : '<span class="customer-target">在逛...</span>') + '</div>').join('') : '<div class="empty-text-sm">等待顾客光临...</div>';
  const sc = getUpgradeCost('shop_shelf', s.upgrades.shop_shelf);
  const bsb = s.upgrades.shop_shelf < 15 ? '<button class="btn-action" ontouchstart="window.game.buyShopShelf()" onclick="window.game.buyShopShelf()" ' + (s.gold < sc ? 'disabled' : '') + '>购买货架 (' + sc + 'G)</button>' : '';

    '<div class="farm-controls"><button class="btn-action" ontouchstart="window.game.autoStockShelves()" onclick="window.game.autoStockShelves()">自动上架</button>' + bsb + '</div>' +

// ===== logistics.js =====
const ROUTE_TYPES = [
  { id: 'farm_to_factory', name: '农场 \u2192 工厂', icon: '\u{1F69B}' },
  { id: 'factory_to_shop', name: '工厂 \u2192 商店', icon: '\u{1F69A}' },
];
function getTransportTime(s) { return Math.max(2, 10 * (1 - 0.10 * (s.upgrades.truck_speed || 0))); }
function createShipment(s, rt, pk, qty) {
  if (!s.logisticsUnlocked) return false;
  if (!ROUTE_TYPES.find(r => r.id === rt)) return false;
  const t = s.logistics.trucks.find(x => !x.busy);
  if (!t) { notify(s, '没有空闲卡车！', 'warning'); return false; }
  if ((s.inventory[pk] || 0) < qty) return false;
  addInv(s, pk, -qty); t.busy = true; t.route = { type: rt, product: pk, quantity: qty }; t.progress = 0; t.startTime = s.gameTime;
  AudioEngine.playTruck(); return true;
}
function updateLogistics(s, dt) {
  if (!s.logisticsUnlocked) return;
  const tt = getTransportTime(s);
  if (s.activeWeather && s.activeWeather.effect.logisticsMod) tt /= s.activeWeather.effect.logisticsMod;
  for (const t of s.logistics.trucks) {
    if (!t.busy || !t.route) continue;
    t.progress += dt / tt;
    if (t.progress >= 1) {
      addInv(s, t.route.product, t.route.quantity);
      const r = ROUTE_TYPES.find(x => x.id === t.route.type);
      notify(s, (r ? r.icon : '\u{1F69B}') + ' 卡车送达 ' + t.route.quantity + 'x ' + (RECIPE_DATA[t.route.product] ? RECIPE_DATA[t.route.product].name : CROP_DATA[t.route.product] ? CROP_DATA[t.route.product].name : t.route.product), 'success');
      AudioEngine.playNotification();
      t.busy = false; t.route = null; t.progress = 0; t.startTime = 0;
    }
  }
  if (s.logistics.autoRoutes) for (const ar of s.logistics.autoRoutes) { if (!ar.active) continue; const ft = s.logistics.trucks.find(x => !x.busy); if (!ft) continue; const q = s.inventory[ar.product] || 0; if (q < ar.minQuantity) continue; createShipment(s, ar.routeType, ar.product, Math.min(q, ar.quantity)); }
}
function addAutoRoute(s, rt, prod, qty, min) {
  if (!s.logistics.autoRoutes) s.logistics.autoRoutes = [];
  s.logistics.autoRoutes.push({ id: Date.now(), routeType: rt, product: prod, quantity: qty || 5, minQuantity: min || 3, active: true });
  notify(s, '添加了自动运输路线', 'success'); return true;
}
function removeAutoRoute(s, id) { if (s.logistics.autoRoutes) s.logistics.autoRoutes = s.logistics.autoRoutes.filter(r => r.id !== id); }
function buyTruck(s) {
  const c = getUpgradeCost('truck', s.upgrades.truck); if (!hasGold(s, c)) return false;
  addGold(s, -c); s.upgrades.truck++; ensureTrucks(s); notify(s, '购买了新卡车', 'success');
  AudioEngine.playUpgrade(); return true;
}

function renderLogistics(s) {
  if (!s.logisticsUnlocked) return '<div class="module-header logistics-scene"><h2>物流中心</h2><p class="module-desc">自动化运输，连接全产业链</p></div><div class="locked-module"><div class="lock-icon">\u{1F512}</div><p>物流中心尚未建造</p><button class="btn-action btn-large" ontouchstart="window.game.buildLogistics()" onclick="window.game.buildLogistics()" ' + (s.gold < BUILD_COSTS.logistics ? 'disabled' : '') + '>建造物流中心 (' + BUILD_COSTS.logistics + 'G)</button></div>';
  const tt = getTransportTime(s);
  const th = s.logistics.trucks.map(t => {
    if (!t.busy) return '<div class="truck idle"><span class="truck-icon">\u{1F69B}</span><span class="truck-status">空闲</span></div>';
    const r = ROUTE_TYPES.find(x => x.id === t.route.type), pct = Math.floor(t.progress * 100);
    return '<div class="truck busy"><span class="truck-icon">\u{1F69B}</span><span class="truck-route">' + (r ? r.name : '运输中') + '</span><span class="truck-cargo">' + (CROP_DATA[t.route.product] ? CROP_DATA[t.route.product].icon : (RECIPE_DATA[t.route.product] ? RECIPE_DATA[t.route.product].icon : '\u{1F4E6}')) + ' ' + t.route.product + ' x' + t.route.quantity + '</span><div class="progress-bar small"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
  }).join('');
  const ii = Object.entries(s.inventory).filter(([_, q]) => q > 0).map(([k, q]) => '<option value="' + k + '">' + (CROP_DATA[k] ? CROP_DATA[k].name : (RECIPE_DATA[k] ? RECIPE_DATA[k].name : k)) + ' (x' + q + ')</option>').join('');
  const ro = ROUTE_TYPES.map(r => '<option value="' + r.id + '">' + r.icon + ' ' + r.name + '</option>').join('');
  const arh = (s.logistics.autoRoutes || []).map(ar => { const r = ROUTE_TYPES.find(x => x.id === ar.routeType); return '<div class="auto-route"><span>' + (r ? r.icon : '\u{1F504}') + ' ' + (r ? r.name : ar.routeType) + ': ' + ar.product + ' x' + ar.quantity + ' (库存>' + ar.minQuantity + ')</span><button class="btn-remove" ontouchstart="window.game.removeAutoRoute(' + ar.id + ')" onclick="window.game.removeAutoRoute(' + ar.id + ')">删除</button></div>'; }).join('');
  const tc = getUpgradeCost('truck', s.upgrades.truck);
  const btb = s.upgrades.truck < 8 ? '<button class="btn-action" ontouchstart="window.game.buyTruck()" onclick="window.game.buyTruck()" ' + (s.gold < tc ? 'disabled' : '') + '>购买卡车 (' + tc + 'G)</button>' : '';
  return '<div class="module-header logistics-scene"><h2>物流中心</h2><p class="module-desc">管理运输车队，连接全产业链</p></div>' +
    '<div class="farm-controls">' + btb + '</div>' +
    '<div class="section-title">车队 (运输时间: ' + Math.ceil(tt) + '秒)</div><div class="trucks-grid">' + th + '</div>' +
    '<div class="section-title">手动发货</div><div class="shipment-form"><select id="ship-route">' + ro + '</select><select id="ship-product">' + (ii || '<option value="">无库存</option>') + '</select><input type="number" id="ship-qty" value="5" min="1" max="100" /><button class="btn-action" ontouchstart="window.game.manualShipment()" onclick="window.game.manualShipment()">发货</button></div>' +
    '<div class="section-title">自动路线</div><div class="auto-routes">' + (arh || '<div class="empty-text-sm">暂无自动路线</div>') + '</div>' +
    '<div class="shipment-form"><select id="auto-route-type">' + ro + '</select><input type="text" id="auto-route-product" placeholder="商品名称" /><input type="number" id="auto-route-qty" value="5" min="1" /><button class="btn-action" ontouchstart="window.game.addAutoRouteFromUI()" onclick="window.game.addAutoRouteFromUI()">添加自动路线</button></div>';
}

function formatNumber(n) { if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T'; if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B'; if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K'; return Math.floor(n).toString(); }
function formatTime(sec) { const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60); if (h > 0) return h + '时' + m + '分'; if (m > 0) return m + '分' + s + '秒'; return s + '秒'; }

function renderHeader(s) {
  const xp = Math.floor(getXPProgress(s) * 100), pm = getPrestigeMultiplier(s);

  return '<div class="header"><div class="header-left"><span class="game-title">\u{1F3ED} 圣王国</span><span class="gold-display">\u{1F4B0} ' + formatNumber(s.gold) + ' G</span></div><div class="header-center"><div class="level-display"><span class="level-badge">Lv.' + s.level + '</span><div class="xp-bar"><div class="xp-fill" style="width:' + xp + '%"></div></div><span class="xp-text">' + xp + '%</span></div></div><div class="header-right">' + (s.prestigeCount > 0 ? '<span class="prestige-badge" title="转生加成">\u{1F451}x' + pm.toFixed(2) + '</span>' : '') + '<span class="season-badge" title="当前季节">' + seasonIcon + '</span><span class="time-display">\u{23F1} ' + formatTime(s.gameTime) + '</span><button class="btn-icon" ontouchstart="window.game.showSettings()" onclick="window.game.showSettings()" title="设置">\u{2699}\u{FE0F}</button></div></div>';
}

function renderTabBar(s) {

function renderUpgrades(s) {

      return '<div class="upgrade-item ' + (mx ? 'maxed' : '') + '"><span class="upgrade-icon">' + d.icon + '</span><div class="upgrade-info"><span class="upgrade-name">' + d.name + '</span><span class="upgrade-effect">' + (d.effectDesc || '') + ' (Lv.' + cur + '/' + d.maxLevel + ')</span></div>' + (mx ? '<span class="upgrade-maxed">已满级</span>' : '<button class="btn-upgrade" ontouchstart="window.game.buyUpgrade(\'' + k + '\')" onclick="window.game.buyUpgrade(\'' + k + '\')" ' + (s.gold < cost ? 'disabled' : '') + '>升级 (' + formatNumber(cost) + 'G)</button>') + '</div>';

// ===== main.js =====
var game;

(function() {
  var state, lastTick, lastSave, lastUI, modalHTML = '', offlineEarnings = null, achievementPopups = [];

  function init() {
    var saved = loadGame();
    if (saved) {
      state = saved;
      var e = calculateOfflineEarnings(state);
      if (e.duration > 60 && (e.gold > 0 || e.xp > 0)) offlineEarnings = e;
    } else {
      state = createInitialState();
    }
    lastTick = performance.now(); lastSave = Date.now(); lastUI = 0;
    generateQuests(state);
    var es = loadEmpireSettings();
    if (es.difficultyLevel) state.settings.difficultyLevel = es.difficultyLevel;
    AudioEngine.bgmEnabled = state.settings.bgm !== false;
    AudioEngine.sfxEnabled = state.settings.sfx !== false;
    render();
    requestAnimationFrame(loop);

    if (offlineEarnings) { modalHTML = renderOfflineModal(offlineEarnings); render(); }
  }

  function loop() {
    requestAnimationFrame(loop);
    var now = performance.now(), dt = Math.min((now - lastTick) / 1000, 0.5);
    lastTick = now;
    update(dt);
    if (Date.now() - lastSave >= 60000) { saveGame(state, { force: true }); lastSave = Date.now(); }
    if (now - lastUI >= 500) { render(); lastUI = now; }
  }

  function update(dt) {
    state.gameTime += dt;
    updateFarm(state, dt);
    if (state.factoryUnlocked) updateFactory(state, dt);
    if (state.shopUnlocked) updateShop(state, dt);
    if (state.logisticsUnlocked) updateLogistics(state, dt);
    updateBuffs(state);
    updateWeather(state, dt);
    updateQuests(state);
    // Check achievements periodically
    if (Math.floor(state.gameTime) % 5 === 0) {
      var newAch = checkAchievements(state);
      for (var i = 0; i < newAch.length; i++) {
        notify(state, '\u{1F3C6} 解锁成就: ' + newAch[i].name + ' [' + getAchievementTierName(newAch[i].tier) + ']', 'gold');
        AudioEngine.playAchievement();
        achievementPopups.push({ ach: newAch[i], time: Date.now() });
      }
    }
  }

  function render() {
    var app = document.getElementById('app'); if (!app) return;
    var c;
    switch (state.currentTab) {
      case 'farm': c = renderFarm(state); break;
      case 'factory': c = renderFactory(state); break;
      case 'shop': c = renderShop(state); break;
      case 'logistics': c = renderLogistics(state); break;
      case 'upgrades': c = renderUpgrades(state); break;
      case 'buffs': c = renderBuffs(state); break;
      case 'quests': c = renderQuests(state); break;
      case 'achievements': c = renderAchievements(state); break;
      case 'npc': c = renderNPC(state); break;
      case 'overview': c = renderOverview(state); break;
      default: c = renderFarm(state);
    }
    // Achievement popups
    var popupHtml = '';
    var now = Date.now();
    achievementPopups = achievementPopups.filter(function(p) { return now - p.time < 3000; });
    if (achievementPopups.length > 0) popupHtml = '<div class="achievement-popups">' + achievementPopups.map(function(p) { return renderAchievementPopup(p.ach); }).join('') + '</div>';
    app.innerHTML = renderHeader(state) + '<div class="main-content">' + c + '</div><div class="notification-area">' + renderNotifications(state) + '</div>' + popupHtml + modalHTML;
    notifyOuterScreen(state.currentTab);
  }

  game = {
    switchTab: function(t) { AudioEngine.playClick(); state.currentTab = t; AudioEngine.switchBGM(t); render(); },
    plantCrop: function(id, k) { if (farmPlantCrop(state, id, k)) render(); },
    harvestCrop: function(id) { if (farmHarvestCrop(state, id)) render(); },
    harvestAll: function() { farmHarvestAll(state); render(); },
    oneClickPlant: function() {
      var unlocked = Object.keys(CROP_DATA).filter(function(k) { return state.level >= CROP_DATA[k].unlockLevel; });
      if (unlocked.length === 0) { notify(state, '没有可种植的作物', 'warning'); render(); return; }
      unlocked.sort(function(a, b) { return CROP_DATA[b].seedCost - CROP_DATA[a].seedCost; });
      var bestKey = unlocked[0];
      var cd = CROP_DATA[bestKey];
      var empties = state.farm.plots.filter(function(p) { return !p.crop; });
      if (empties.length === 0) { notify(state, '没有空地可种植', 'warning'); render(); return; }
      if (!hasGold(state, cd.seedCost)) {
        notify(state, '金币不足，需要 ' + cd.seedCost + 'G 种植 ' + cd.name, 'warning'); render(); return;
      }
      var count = 0;
      for (var i = 0; i < empties.length; i++) {
        if (state.gold < cd.seedCost) break;
        farmPlantCrop(state, empties[i].id, bestKey);
        count++;
      }
      var skipped = empties.length - count;
      if (count > 0 && skipped > 0) {
        notify(state, '已种植 ' + count + ' 块 ' + cd.icon + ' ' + cd.name + '，金币不足，剩余 ' + skipped + ' 块空着', 'warning');
      } else if (count > 0) {
        notify(state, '全部种上了 ' + cd.icon + ' ' + cd.name + '（共 ' + count + ' 块）', 'success');
      }
      render();
    },
    sellRawCrop: function(k) { if (sellRawCrop(state, k)) render(); },
    buyFarmPlot: function() { if (buyFarmPlot(state)) render(); },
    buildFactory: function() { if (hasGold(state, BUILD_COSTS.factory)) { addGold(state, -BUILD_COSTS.factory); state.factoryUnlocked = true; notify(state, '加工厂建造完成！', 'success'); AudioEngine.playUpgrade(); render(); } },
    startProduction: function(id, k) { if (factoryStartProduction(state, id, k)) render(); },
    collectProduct: function(id) { if (factoryCollectProduct(state, id)) render(); },
    collectAllFactory: function() { factoryCollectAll(state); render(); },
    sellFactoryProduct: function(k) { if (sellFactoryProduct(state, k)) render(); },
    buyFactoryMachine: function() { if (buyFactoryMachine(state)) render(); },
    buildShop: function() { if (hasGold(state, BUILD_COSTS.shop)) { addGold(state, -BUILD_COSTS.shop); state.shopUnlocked = true; notify(state, '商店建造完成！', 'success'); AudioEngine.playUpgrade(); render(); } },
    stockShelf: function(id, k) { if (shopStockShelf(state, id, k)) render(); },
    autoStockShelves: function() { autoStockShelves(state); render(); },
    buyShopShelf: function() { if (buyShopShelf(state)) render(); },
    buildLogistics: function() { if (hasGold(state, BUILD_COSTS.logistics)) { addGold(state, -BUILD_COSTS.logistics); state.logisticsUnlocked = true; notify(state, '物流中心建造完成！', 'success'); AudioEngine.playUpgrade(); render(); } },
    manualShipment: function() { var re = document.getElementById('ship-route'), pe = document.getElementById('ship-product'), qe = document.getElementById('ship-qty'); if (!re || !pe || !qe) return; if (createShipment(state, re.value, pe.value, parseInt(qe.value) || 1)) render(); },
    addAutoRouteFromUI: function() { var re = document.getElementById('auto-route-type'), pe = document.getElementById('auto-route-product'), qe = document.getElementById('auto-route-qty'); if (!re || !pe || !qe) return; if (pe.value) { addAutoRoute(state, re.value, pe.value, parseInt(qe.value) || 5, 3); render(); } },
    removeAutoRoute: function(id) { removeAutoRoute(state, id); render(); },
    buyTruck: function() { if (buyTruck(state)) render(); },
    buyUpgrade: function(k) { var c = getUpgradeCost(k, state.upgrades[k] || 0); if (hasGold(state, c)) { addGold(state, -c); state.upgrades[k]++; state.stats.totalUpgrades = (state.stats.totalUpgrades || 0) + 1; notify(state, '升级了 ' + UPGRADE_DATA[k].name + '！', 'success'); AudioEngine.playUpgrade(); render(); } },
    activateBuff: function(k) { if (activateBuff(state, k)) { AudioEngine.playCoin(); render(); } },
    doPrestige: function() { var r = doPrestige(state); if (r) { AudioEngine.playPrestigeBGM(); modalHTML = '<div class="modal-overlay"><div class="modal"><h3>\u{1F31F} 转生成功！</h3><p>获得 ' + r.newPoints + ' 转生点数</p><p>当前总点数: ' + r.totalPoints + '</p><button class="btn-action btn-large" ontouchstart="window.game.closeModal()" onclick="window.game.closeModal()">继续</button></div></div>'; render(); } },
    save: function() { if (saveGame(state, { force: true })) { notify(state, '游戏已保存！', 'success'); render(); } },
    showSettings: function() { modalHTML = renderSettingsModal(state); render(); },
    closeModal: function() { modalHTML = ''; render(); },
    hardReset: function() { if (confirm('确定要重置所有进度吗？此操作不可撤销！')) { if (confirm('真的确定吗？所有数据将永久删除！')) { deleteSave(); state = createInitialState(); modalHTML = ''; render(); } } },
    dismissOffline: function() { if (offlineEarnings) { applyOfflineEarnings(state, offlineEarnings); offlineEarnings = null; } modalHTML = ''; render(); },
    toggleBGM: function() { state.settings.bgm = !state.settings.bgm; AudioEngine.bgmEnabled = state.settings.bgm; if (!state.settings.bgm) AudioEngine.stopBGM(); else AudioEngine.switchBGM(state.currentTab); saveGame(state, { force: true }); render(); },
    toggleSFX: function() { state.settings.sfx = !state.settings.sfx; AudioEngine.sfxEnabled = state.settings.sfx; saveGame(state, { force: true }); render(); },
    setDifficulty: function(lv) {
      state.settings.difficultyLevel = lv;
      saveGame(state, { force: true });
      var es = loadEmpireSettings();
      es.difficultyLevel = lv;
      saveEmpireSettings(es);
      modalHTML = '<div class="modal-overlay"><div class="modal"><h3>难度已更改</h3><p>新难度将在下次加载游戏时生效。</p><p>当前难度: ' + (lv === 'easy' ? '简单' : lv === 'hard' ? '困难' : '普通') + '</p><button class="btn-action btn-large" onclick="window.game.closeModal()">确定</button></div></div>';
      render();
    },
    claimQuest: function(qid) { if (claimQuestReward(state, qid)) render(); },
    advanceNPC: function(npcId) {
      var result = advanceNPC(state, npcId);
      if (result) {
        notify(state, '\u{1F3C6} 完成NPC任务: ' + result.task + ' +' + result.reward.gold + 'G', 'success');
        AudioEngine.playCoin();
      } else {
        notify(state, '任务条件未满足', 'warning');
      }
      render();
    },
  };

  // Touch optimization: initialize audio on first user interaction
  function onFirstInteraction() {
    AudioEngine.ensureInit();
    AudioEngine.switchBGM(state.currentTab);
    document.removeEventListener('touchstart', onFirstInteraction);
    document.removeEventListener('click', onFirstInteraction);
  }
  document.addEventListener('touchstart', onFirstInteraction, { passive: true });
  document.addEventListener('click', onFirstInteraction);

  // Echo Game Settings Bridge
  function empireApplySettings(payload) {
    if (typeof payload.globalSoundEnabled === 'boolean') {
      AudioEngine.sfxEnabled = payload.globalSoundEnabled;
    }
    if (typeof payload.globalBgmEnabled === 'boolean') {
      AudioEngine.bgmEnabled = payload.globalBgmEnabled;
      if (!payload.globalBgmEnabled) AudioEngine.stopBGM();
      else AudioEngine.switchBGM(state.currentTab);
    }
  }
  window.setGameSettings = empireApplySettings;

  window.addEventListener('message', function(event) {
    var data = event.data;
    if (!data) return;

    if (data.type === 'game-settings-changed') {
      empireApplySettings(data.payload || {});
      return;
    }
    if (data.type === 'game-export-request') {
      var saveData = null;
      try { saveData = localStorage.getItem('vertical_farm_game_save_v2'); } catch (_) {}
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'game-export-data', requestId: data.requestId, data: { saveData: saveData } }, '*');
      }
      return;
    }
    if (data.type === 'game-import-request') {
      var success = false;
      try {
        if (data.saveData) {
          localStorage.setItem('vertical_farm_game_save_v2', data.saveData);
          success = true;
          setTimeout(function() { location.reload(); }, 100);
        }
      } catch (_) {}
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'game-import-result', requestId: data.requestId, success: success }, '*');
      }
      return;
    }

    if (data.source !== 'empire-host') return;
    if (data.type === 'switch-screen') {
      var allowed = ['farm', 'factory', 'shop', 'logistics', 'upgrades', 'buffs', 'quests', 'achievements', 'npc', 'overview'];
      if (allowed.indexOf(data.screen) !== -1) {
        try { game.switchTab(data.screen); } catch (_) {}
      }
    } else if (data.type === 'request-state') {
      try { notifyOuterScreen(state.currentTab || 'farm'); } catch (_) {}
    } else if (data.type === 'save-now') {
      var ok = false;
      try { ok = !!saveGame(state, { force: true }); } catch (_) {}
      try { window.parent.postMessage({ source: 'empire-game', type: 'save-complete', requestId: data.requestId, ok: ok }, '*'); } catch (_) {}
    }
  });

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
